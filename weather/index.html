<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>🌦 Weather Dashboard</h1>

<div class="search">
<input
type="text"
id="cityInput"
placeholder="Enter city name">

<button id="searchBtn">
Search
</button>
</div>

<p id="message"></p>

<div id="weather" class="hidden">

<h2 id="city"></h2>

<div class="info">
<p id="temp"></p>
<p id="desc"></p>
<p id="humidity"></p>
<p id="wind"></p>
</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
